<!DOCTYPE html>
<html>
<head>

<body style="margin:0;padding:0;background-color:#f4f4f7;font-family:Arial,Helvetica,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f7;padding:24px 0;">
<tr><td align="center">
<table width="100%" cellpadding="0" cellspacing="0" style="max-width:960px;background-color:#ffffff;border-radius:8px;overflow:hidden;">

  <!-- Header -->

    <td style="background-color:#1a1a2e;padding:24px 32px;">
      <h1 style="margin:0;color:#ffffff;font-size:22px;font-weight:600;">HAFT Daily Sourcing Report</h1>
      <p style="margin:6px 0 0;color:#a0a0b8;font-size:14px;">${date} &mdash; ${count} qualifying filing(s)</p>

  </tr>

  <!-- Body -->
  <tr>
    <td style="padding:24px 32px;">
      ${content}
    </td>
  </tr>

  <!-- Footer -->
  <tr>
    <td style="padding:16px 32px;background-color:#f9f9fb;border-top:1px solid #e8e8ed;">
      <p style="margin:0;color:#999;font-size:12px;">HAFT Distress Sourcing Operator &mdash; Phase 1 &mdash; Automated report. Do not reply.</p>
    </td>
  </tr>

</table>
</td></tr>
</table>

</html>
